name: Verify agentic lock files

on:
  pull_request:
    paths:
      - '.github/workflows/*.md'
      - '.github/workflows/*.lock.yml'
  push:
    branches: [main]
    paths:
      - '.github/workflows/*.md'
      - '.github/workflows/*.lock.yml'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gh-aw (pinned)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh extension install github/gh-aw --pin v0.81.6

      - name: Recompile all workflows
        run: gh aw compile

      - name: Fail if lock files are stale
        run: |
          if ! git diff --exit-code -- '.github/workflows/*.lock.yml'; then
            echo "::error::Lock files are out of date. Run 'gh aw compile' locally and commit the result."
            exit 1
          fi
